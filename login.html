<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Хотелски Обяви</title>
    <style>
        body {
            background: linear-gradient(135deg, #0d6efd 0%, #0a429b 100%) !important;
        }
        .card {
            border: none;
            border-radius: 15px;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="card shadow-lg p-2" style="width: 100%; max-width: 420px;">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <h3 class="fw-bold text-primary">🏨 Хотелски Обяви</h3>
                <p class="text-muted small">Влезте в акаунта си, за да резервирате престой</p>

            </div>
            
            <form id="loginForm">
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="email" required placeholder="name@example.com">
                    <label for="email">Имейл адрес</label>
                </div>
                <div class="form-floating mb-4">
                    <input type="password" class="form-control" id="password" required placeholder="******">
                    <label for="password">Парола</label>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm mb-3">Вход в системата</button>
            </form>

            <div class="text-center mt-3">
                <span class="text-muted small">Нямате акаунт?</span>
                <a href="register.html" class="text-decoration-none fw-bold small">Създайте тук</a>
            </div>
        </div>
    </div>

    <script type="module" src="/src/login.js"></script>
</body>
</html>
