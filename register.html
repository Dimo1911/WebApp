<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Хотелски Обяви</title>
    <!-- Добавете този ред точно тук: -->
    <script type="module">
        import 'bootstrap/dist/css/bootstrap.min.css';
    </script>
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div class="card shadow-sm" style="width: 100%; max-width: 400px;">
        <div class="card-body p-4">
            <h3 class="card-title text-center mb-4">Регистрация</h3>
            <form id="registerForm">
                <div class="mb-3">
                    <label for="regEmail" class="form-label">Имейл адрес</label>
                    <input type="email" class="form-control" id="regEmail" required placeholder="name@example.com">
                </div>
                <div class="mb-3">
                    <label for="regPassword" class="form-label">Парола</label>
                    <input type="password" class="form-control" id="regPassword" required placeholder="******">
                </div>
                <button type="submit" class="btn btn-success w-100 mb-3">Създай акаунт</button>
            </form>
            <div class="text-center">
                <span class="text-muted">Вече имате акаунт?</span>
                <a href="login.html" class="text-decoration-none">Влезте тук</a>
            </div>
        </div>
    </div>
</body>
</html>
