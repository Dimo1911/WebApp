<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Хотелски Обяви</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div class="card shadow-sm" style="width: 100%; max-width: 400px;">
        <div class="card-body p-4">
            <h3 class="card-title text-center mb-4">Регистрация</h3>
            <form id="registerForm">
                <div class="mb-3">
                    <label for="email" class="form-label">Имейл адрес</label>
                    <input type="email" class="form-control" id="email" required placeholder="name@example.com">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Парола</label>
                    <input type="password" class="form-control" id="password" required placeholder="******">
                </div>
                <!-- Добавено задължително поле за потвърждение на паролата -->
                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">Повторете паролата</label>
                    <input type="password" class="form-control" id="confirmPassword" required placeholder="******">
                </div>
                <button type="submit" class="btn btn-success w-100 mb-3">Създай акаунт</button>
            </form>
            <div class="text-center">
                <span class="text-muted">Вече имате акаунт?</span>
                <a href="login.html" class="text-decoration-none">Влезте тук</a>
            </div>
        </div>
    </div>

    <!-- Задължителна връзка към JS логиката за регистрация -->
    <script type="module" src="/src/register.js"></script>
</body>
</html>
