<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Детайли за обявата - Хотелски Обяви</title>
</head>
<body class="bg-light">

    <!-- Навигация -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm py-3 mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary fs-4" href="index.html">🏨 Хотелски Обяви</a>
            <a href="index.html" class="btn btn-outline-primary px-3 fw-bold rounded-pill">Назад към обявите</a>
        </div>
    </nav>

    <div class="container mb-5">
        <div class="row g-5">
            <!-- Лява колона: Снимка и Описание -->
            <div class="col-lg-7">
                <div class="card border-0 shadow-sm rounded-3 overflow-hidden mb-4">
                    <!-- Снимката ще се зареди динамично през JS -->
                    <img id="hotel-image" src="" class="img-fluid w-100" style="max-height: 450px; object-fit: cover; display: none;" alt="Снимка на хотела">
                    <!-- Зареждащ контейнер (Spinner) -->
                    <div id="image-loading" class="text-center p-5 bg-secondary text-white">
                        <div class="spinner-border text-light" role="status"></div>
                        <p class="mt-2 mb-0">Зареждане на снимката...</p>
                    </div>
                </div>
                <h1 id="hotel-title" class="fw-bold text-dark mb-3">Зареждане на заглавие...</h1>
                <hr>
                <h4 class="fw-bold text-secondary mb-3">За престоя</h4>
                <p id="hotel-description" class="fs-5 text-muted">Моля, изчакайте, докато изтеглим пълното описание на обявата от базата данни...</p>
            </div>

            <!-- Дясна колона: Форма за избор на дати и Калкулатор -->
            <div class="col-lg-5">
                <div class="card border-0 shadow-lg p-4 bg-white rounded-3 sticky-top" style="top: 20px;">
                    <h3 class="fw-bold text-dark mb-1">Резервация</h3>
                    <p class="text-primary fw-bold fs-4 mb-4">
                        <span id="price-per-night">0</span> BGN <span class="fs-6 text-muted fw-normal">/ нощ</span>
                    </p>

                    <form id="booking-form">
                        <div class="mb-3">
                            <label for="check-in" class="form-label small fw-bold text-muted">Дата на настаняване</label>
                            <input type="date" class="form-control form-control-lg rounded-3" id="check-in" required>
                        </div>
                        <div class="mb-4">
                            <label for="check-out" class="form-label small fw-bold text-muted">Дата на напускане</label>
                            <input type="date" class="form-control form-control-lg rounded-3" id="check-out" required>
                        </div>

                        <!-- Калкулатор на сумата -->
                        <div id="calculator-section" class="bg-light p-3 rounded-3 mb-4" style="display: none;">
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted">Нощувки:</span>
                                <span id="total-nights" class="fw-bold">0</span>
                            </div>
                            <div class="d-flex justify-content-between border-top pt-2">
                                <span class="fw-bold fs-5">Обща сума:</span>
                                <span class="fw-bold fs-5 text-primary"><span id="total-price">0</span> BGN</span>
                            </div>
                        </div>

                        <!-- Нефункционален бутон според изискванията -->
                        <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold rounded-3 shadow-sm py-3">Заявете резервация</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Връзка към JS скрипта на страницата -->
    <script type="module" src="/src/details.js"></script>
</body>
</html>
